name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # We specify the OS for more stability
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: digabi/buildozer-action@v2
        with:
          buildozer_version: stable
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ENIAC-APK
          path: bin/*.apk
          
